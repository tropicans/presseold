services:
  postgres:
    image: postgres:16-alpine
    container_name: presensi-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: presensi_attendance
      POSTGRES_USER: presensi_user
      POSTGRES_PASSWORD: presensi_secret_2026
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U presensi_user -d presensi_attendance"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: presensi-app
    restart: unless-stopped
    ports:
      - "3456:3456"
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
